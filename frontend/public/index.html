<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="theme-color" content="#6366f1">
      <meta name="description"
            content="BillSoft: India's smartest GST billing and invoicing app. Generate e-invoices, e-way bills, and share instantly via WhatsApp. Free demo available!">
      <meta name="robots" content="index, follow">
      <title>BillSoft – Best GST Billing, Invoicing & Inventory App</title>
      <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/Bill (1).svg" />
      <link rel="apple-touch-icon" href="%PUBLIC_URL%/Bill (1).svg" />
      <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/logo.svg" />
      <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.svg" />
      <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

      <!-- Preload Critical LCP Asset -->
      <link rel="preload" as="image" href="%PUBLIC_URL%/hero_pos.png" fetchpriority="high">


      <!-- Open Graph / Social -->
      <meta property="og:title" content="BillSoft – Smart GST Billing &amp; Invoicing Software" />
      <meta property="og:description"
            content="Simplify GST billing with BillSoft. Create invoices, generate e-invoices &amp; waybills, and share invoices instantly via WhatsApp. Start your free demo today!" />
      <meta property="og:image" content="%PUBLIC_URL%/logo.svg" />
      <meta property="og:type" content="website" />

      <!-- ── DNS prefetch & preconnect for CDNs (reduces latency) ─────────── -->
      <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
      <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
      <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
      <link rel="dns-prefetch" href="https://unpkg.com">
      <link rel="dns-prefetch" href="https://fonts.googleapis.com">
      <link rel="dns-prefetch" href="https://fonts.gstatic.com">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


      <!-- ── Google Fonts with font-display=swap (prevents invisible text) ── -->
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap&font-display=swap"
            rel="stylesheet">

      <!-- style_landing.css has been merged into src/styles/globals.css for "Only One CSS" optimization -->

      <!-- ── Non-critical external CSS – loaded async (non-render-blocking) ─ -->
      <!-- media=print trick: browser fetches but doesn't block paint; onload switches to all -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            media="print" onload="this.media='all'">
      <noscript>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
      </noscript>

      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            media="print" onload="this.media='all'">
      <noscript>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
      </noscript>

      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            media="print" onload="this.media='all'">
      <noscript>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
      </noscript>

      <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" media="print" onload="this.media='all'">
      <noscript>
            <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
      </noscript>
</head>

<body>
      <div id="root"></div>

      <!-- ── Deferred scripts (don't block rendering) ───────────────────────── -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
      <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
</body>

</html>
